<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estrattore Ordine Oggetti</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Estrattore">
    <link rel="apple-touch-icon" href="icona-192.png">

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="container">
        <h1>Inserisci Oggetti</h1>
        
        <div class="input-group" id="inputWrapper">
            <input type="text" class="input-oggetto" placeholder="Oggetto 1" value="Mela">
            <input type="text" class="input-oggetto" placeholder="Oggetto 2" value="Libro">
            <input type="text" class="input-oggetto" placeholder="Oggetto 3" value="Chiave">
            <input type="text" class="input-oggetto" placeholder="Oggetto 4" value="Palla">
            <input type="text" class="input-oggetto" placeholder="Oggetto 5" value="Orologio">
        </div>

        <button id="btnEstrai">Estrai Sequenza</button>

        <div id="risultato" role="alert" aria-live="polite">
            Clicca per estrarre.
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
