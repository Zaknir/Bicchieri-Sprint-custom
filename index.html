<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estrattore Ordine Oggetti</title>
    <style>
        /* Struttura e centratura */
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
        }

        #container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 90%;
            width: 500px;
        }

        h1 {
            color: #0056b3;
            margin-bottom: 20px;
        }

        /* Griglia input */
        .input-group {
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* Stile input */
        input {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
            font-size: 1em;
        }

        /* Pulsante estrazione */
        button {
            padding: 15px 30px;
            font-size: 1.2em;
            color: white;
            background-color: #007bff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 25px;
        }

        button:active { transform: scale(0.98); }

        /* Box risultato */
        #risultato {
            margin-top: 20px;
            font-size: 1.3em;
            font-weight: bold;
            padding: 20px;
            border: 2px solid #007bff;
            border-radius: 8px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div id="container">
        <h1>Ordine Oggetti</h1>
        
        <div class="input-group">
            <input type="text" class="input-oggetto" id="obj1" placeholder="Oggetto 1" value="Mela">
            <input type="text" class="input-oggetto" id="obj2" placeholder="Oggetto 2" value="Libro">
            <input type="text" class="input-oggetto" id="obj3" placeholder="Oggetto 3" value="Chiave">
            <input type="text" class="input-oggetto" id="obj4" placeholder="Oggetto 4" value="Palla">
        </div>

        <button id="estraiCarta">Estrai Ordine</button>

        <div id="risultato" role="alert" aria-live="polite">
            Clicca per estrarre.
        </div>
    </div>

    <script>
        const direzioni = ["da Sinistra a Destra", "da Destra a Sinistra", "dall'Alto in Basso", "dal Basso in Alto"];
        const storicoCombinazioni = [];
        const MAX_STORICO = 5;

        // Gestione Focus: seleziona tutto il testo al click
        document.querySelectorAll('.input-oggetto').forEach(input => {
            input.addEventListener('focus', function() {
                // Seleziona tutto il contenuto per cancellazione rapida
                this.select();
            });
            
            input.addEventListener('mouseup', function(e) {
                // Impedisce al click di deselezionare subito il testo su alcuni browser
                e.preventDefault();
            });
        });

        function mischiaArray(array) {
            let arrayCopiato = [...array]; 
            let currentIndex = arrayCopiato.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [arrayCopiato[currentIndex], arrayCopiato[randomIndex]] = [
                    arrayCopiato[randomIndex], arrayCopiato[currentIndex]];
            }
            return arrayCopiato;
        }

        function estraiCarta() {
            const oggetti = [
                document.getElementById('obj1').value.trim() || "Oggetto 1",
                document.getElementById('obj2').value.trim() || "Oggetto 2",
                document.getElementById('obj3').value.trim() || "Oggetto 3",
                document.getElementById('obj4').value.trim() || "Oggetto 4"
            ];

            let combinazioneValida = false;
            let direzioneCasuale, ordineCasualeOggetti, combinazioneChiave;

            while (!combinazioneValida) {
                direzioneCasuale = direzioni[Math.floor(Math.random() * direzioni.length)];
                ordineCasualeOggetti = mischiaArray(oggetti);
                combinazioneChiave = direzioneCasuale + "|" + ordineCasualeOggetti.join(',');

                if (!storicoCombinazioni.includes(combinazioneChiave)) {
                    combinazioneValida = true;
                }
            }

            storicoCombinazioni.unshift(combinazioneChiave);
            if (storicoCombinazioni.length > MAX_STORICO) { storicoCombinazioni.pop(); }

            document.getElementById('risultato').textContent = `${direzioneCasuale}: ${ordineCasualeOggetti.join(', ')}.`;
        }

        document.getElementById('estraiCarta').addEventListener('click', estraiCarta);
    </script>
</body>
</html>
